<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" href="./icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />

    <meta name="theme-color" content="#ffffff" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link href="./styles.css" rel="stylesheet" />

    <title>Twitch Records</title>
  </head>
  <body>
    <div class="video-player-container">
      <div class="channel-header">
        <div class="channel-avatar"></div>
        <div class="channel-details">
          <h3>Лебидло Aрхів Стрімов</h3>
          <p>Записи з усіх стрімів Михайла Лебіги від 05.09.2023</p>
        </div>
      </div>

      <div class="video-metadata">
        <h2 class="video-title">Назва відео</h2>
        <p class="video-date">14 липня 2025</p>
      </div>

      <div class="video-container">
        <div class="custom-video-player" id="videoPlayer">
          <video id="video" muted>
            <source src="" type="video/mp4" />
            Ваш браузер не підтримує відео тег.
          </video>

          <div class="video-overlay" id="overlay">
            <button class="play-button" id="playBtn">
              <span id="playIcon">▶</span>
            </button>
          </div>

          <div class="controls" id="controls">
            <div class="progress-container">
              <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
              </div>
            </div>

            <div class="controls-row">
              <button class="control-button" id="playPauseBtn">
                <span id="playPauseIcon">▶</span>
              </button>

              <div class="time-display" id="timeDisplay">00:00 / 00:00</div>

              <div class="volume-container">
                <button class="control-button" id="volumeBtn">
                  <span id="volumeIcon">🔊</span>
                </button>
                <div class="volume-slider" id="volumeSlider">
                  <div class="volume-fill" id="volumeFill"></div>
                </div>
              </div>

              <button class="control-button" id="fullscreenBtn">
                <span>⛶</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="donation-banner">
        <div class="donation-info">
          <div class="donation-icon">💝</div>
          <div class="donation-text">
            <h4>🫙Підтримай мене</h4>
            <p>Підтримай мене якщо тобi подобається те що я роблю</p>
          </div>
        </div>
        <a href="https://send.monobank.ua/jar/7CsHYUnPeN" class="donation-button"
          >Підтримати</a
        >
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <script src="./videoPlayer.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
