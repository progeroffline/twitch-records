<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Twitch Records</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #0f1419 0%, #1a2332 100%);
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .video-player-container {
        max-width: 800px;
        width: 100%;
        background: #17212b;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        display: flex;
        flex-direction: column;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .channel-header {
        background: linear-gradient(135deg, #2b5278 0%, #1e3a5f 100%);
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .channel-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .channel-details h3 {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 2px;
      }

      .channel-details p {
        font-size: 13px;
        opacity: 0.7;
      }

      .video-metadata {
        padding: 16px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.02);
      }

      .video-title {
        font-size: 18px;
        font-weight: 600;
        line-height: 1.4;
        margin-bottom: 6px;
        color: #ffffff;
      }

      .video-date {
        font-size: 13px;
        color: #8aa8c8;
        font-weight: 400;
      }

      .video-container {
        position: relative;
        width: 100%;
        background: #000;
        aspect-ratio: 16/9;
        overflow: hidden;
      }

      .custom-video-player {
        width: 100%;
        height: 100%;
        position: relative;
        background: #000;
        cursor: pointer;
      }

      .custom-video-player video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .video-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
      }

      .video-overlay.visible {
        opacity: 1;
        pointer-events: auto;
      }

      .play-button {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 28px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 20px rgba(74, 144, 226, 0.4);
        border: none;
        outline: none;
      }

      .play-button:hover {
        transform: scale(1.1);
        box-shadow: 0 6px 24px rgba(74, 144, 226, 0.6);
      }

      .play-button:active {
        transform: scale(0.95);
      }

      .controls {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
        padding: 20px 16px 16px;
        transform: translateY(100%);
        transition: transform 0.3s ease;
      }

      .custom-video-player:hover .controls,
      .controls.visible {
        transform: translateY(0);
      }

      .progress-container {
        margin-bottom: 12px;
      }

      .progress-bar {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 3px;
        overflow: hidden;
        cursor: pointer;
        position: relative;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #4a90e2 0%, #357abd 100%);
        border-radius: 3px;
        transition: width 0.1s ease;
        position: relative;
      }

      .progress-fill::after {
        content: '';
        position: absolute;
        right: -6px;
        top: 50%;
        width: 12px;
        height: 12px;
        background: white;
        border-radius: 50%;
        transform: translateY(-50%);
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .progress-bar:hover .progress-fill::after {
        opacity: 1;
      }

      .controls-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .control-button {
        background: none;
        border: none;
        color: white;
        font-size: 18px;
        cursor: pointer;
        padding: 6px;
        border-radius: 4px;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
      }

      .control-button:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: scale(1.1);
      }

      .control-button:active {
        transform: scale(0.9);
      }

      .time-display {
        font-size: 13px;
        color: #ffffff;
        min-width: 100px;
        text-align: center;
        font-weight: 500;
      }

      .volume-container {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-left: auto;
      }

      .volume-slider {
        width: 80px;
        height: 4px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 2px;
        cursor: pointer;
        position: relative;
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .volume-container:hover .volume-slider {
        opacity: 1;
      }

      .volume-fill {
        height: 100%;
        background: linear-gradient(90deg, #4a90e2 0%, #357abd 100%);
        border-radius: 2px;
        transition: width 0.1s ease;
      }

      .donation-banner {
        background: linear-gradient(135deg, #2b5278 0%, #4a6741 100%);
        padding: 16px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
      }

      .donation-info {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .donation-icon {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }

      .donation-text h4 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 2px;
      }

      .donation-text p {
        font-size: 12px;
        opacity: 0.8;
      }

      .donation-button {
        background: #ffffff;
        color: #2b5278;
        border: none;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
      }

      .donation-button:hover {
        background: #f0f0f0;
        transform: translateY(-1px);
      }

      @media (max-width: 768px) {
        body {
          padding: 10px;
        }

        .video-player-container {
          border-radius: 12px;
        }

        .play-button {
          width: 60px;
          height: 60px;
          font-size: 24px;
        }

        .donation-banner {
          padding: 12px 16px;
          flex-direction: column;
          text-align: center;
        }

        .donation-info {
          flex-direction: column;
          text-align: center;
        }

        .donation-button {
          width: 100%;
          max-width: 200px;
        }
      }
    </style>
  </head>
  <body>
    <div class="video-player-container">
      <div class="channel-header">
        <div class="channel-avatar">ЛА</div>
        <div class="channel-details">
          <h3>Лебидло Aрхів Стрімов</h3>
          <p>Записи з усіх стрімів Михайла Лебіги від 05.09.2023</p>
        </div>
      </div>

      <div class="video-metadata">
        <h2 class="video-title">Назва відео</h2>
        <p class="video-date">14 липня 2025</p>
      </div>

      <div class="video-container">
        <div class="custom-video-player" id="videoPlayer">
          <video id="video" muted>
            <source
              src="https://sample-videos.com/zip/10/mp4/SampleVideo_1280x720_1mb.mp4"
              type="video/mp4"
            />
            Ваш браузер не підтримує відео тег.
          </video>

          <div class="video-overlay" id="overlay">
            <button class="play-button" id="playBtn">
              <span id="playIcon">▶</span>
            </button>
          </div>

          <div class="controls" id="controls">
            <div class="progress-container">
              <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
              </div>
            </div>

            <div class="controls-row">
              <button class="control-button" id="playPauseBtn">
                <span id="playPauseIcon">▶</span>
              </button>

              <div class="time-display" id="timeDisplay">00:00 / 00:00</div>

              <div class="volume-container">
                <button class="control-button" id="volumeBtn">
                  <span id="volumeIcon">🔊</span>
                </button>
                <div class="volume-slider" id="volumeSlider">
                  <div class="volume-fill" id="volumeFill"></div>
                </div>
              </div>

              <button class="control-button" id="fullscreenBtn">
                <span>⛶</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="donation-banner">
        <div class="donation-info">
          <div class="donation-icon">💝</div>
          <div class="donation-text">
            <h4>🫙Підтримай мене</h4>
            <p>Підтримай мене якщо тобi подобається те що я роблю</p>
          </div>
        </div>
        <a href="https://send.monobank.ua/jar/7CsHYUnPeN" class="donation-button"
          >Підтримати</a
        >
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <script>
      class TelegramVideoPlayer {
        constructor() {
          this.video = document.getElementById('video');
          this.overlay = document.getElementById('overlay');
          this.controls = document.getElementById('controls');
          this.playBtn = document.getElementById('playBtn');
          this.playPauseBtn = document.getElementById('playPauseBtn');
          this.playIcon = document.getElementById('playIcon');
          this.playPauseIcon = document.getElementById('playPauseIcon');
          this.progressBar = document.getElementById('progressBar');
          this.progressFill = document.getElementById('progressFill');
          this.timeDisplay = document.getElementById('timeDisplay');
          this.volumeBtn = document.getElementById('volumeBtn');
          this.volumeIcon = document.getElementById('volumeIcon');
          this.volumeSlider = document.getElementById('volumeSlider');
          this.volumeFill = document.getElementById('volumeFill');
          this.fullscreenBtn = document.getElementById('fullscreenBtn');
          this.videoPlayer = document.getElementById('videoPlayer');

          this.isPlaying = false;
          this.isMuted = false;
          this.volume = 1;
          this.controlsTimeout = null;
          this.hls = null;

          this.init();
        }

        init() {
          this.setupEventListeners();
          this.showOverlay();
          this.updateVolumeDisplay();
          this.video.volume = this.volume;
        }

        loadVideo(src) {
          if (this.hls) {
            this.hls.destroy();
          }

          // Check if the source is HLS (.m3u8)
          if (src.includes('.m3u8')) {
            if (Hls.isSupported()) {
              this.hls = new Hls({
                enableWorker: false,
                lowLatencyMode: true,
                backBufferLength: 90,
              });
              this.hls.loadSource(src);
              this.hls.attachMedia(this.video);

              this.hls.on(Hls.Events.MANIFEST_PARSED, () => {
                console.log('HLS manifest loaded');
              });

              this.hls.on(Hls.Events.ERROR, (event, data) => {
                console.error('HLS error:', data);
              });
            } else if (this.video.canPlayType('application/vnd.apple.mpegurl')) {
              // Native HLS support (Safari)
              this.video.src = src;
            } else {
              console.error('HLS not supported');
            }
          } else {
            // Regular video file
            this.video.src = src;
          }
        }

        setupEventListeners() {
          // Play/Pause functionality
          this.playBtn.addEventListener('click', () => this.togglePlay());
          this.playPauseBtn.addEventListener('click', () => this.togglePlay());
          this.video.addEventListener('click', () => this.togglePlay());

          // Progress bar
          this.progressBar.addEventListener('click', e => this.seek(e));
          this.video.addEventListener('timeupdate', () => this.updateProgress());
          this.video.addEventListener('loadedmetadata', () => this.updateTimeDisplay());

          // Volume control
          this.volumeBtn.addEventListener('click', () => this.toggleMute());
          this.volumeSlider.addEventListener('click', e => this.setVolume(e));

          // Fullscreen
          this.fullscreenBtn.addEventListener('click', () => this.toggleFullscreen());

          // Video events
          this.video.addEventListener('play', () => this.onPlay());
          this.video.addEventListener('pause', () => this.onPause());
          this.video.addEventListener('ended', () => this.onEnded());

          // Controls visibility
          this.videoPlayer.addEventListener('mousemove', () => this.showControls());
          this.videoPlayer.addEventListener('mouseleave', () => this.hideControls());

          // Keyboard shortcuts
          document.addEventListener('keydown', e => this.handleKeyboard(e));
        }

        togglePlay() {
          if (this.isPlaying) {
            this.video.pause();
          } else {
            this.video.play();
          }
        }

        onPlay() {
          this.isPlaying = true;
          this.playIcon.textContent = '⏸';
          this.playPauseIcon.textContent = '⏸';
          this.hideOverlay();
        }

        onPause() {
          this.isPlaying = false;
          this.playIcon.textContent = '▶';
          this.playPauseIcon.textContent = '▶';
          this.showOverlay();
        }

        onEnded() {
          this.isPlaying = false;
          this.playIcon.textContent = '▶';
          this.playPauseIcon.textContent = '▶';
          this.showOverlay();
        }

        showOverlay() {
          this.overlay.classList.add('visible');
        }

        hideOverlay() {
          this.overlay.classList.remove('visible');
        }

        showControls() {
          this.controls.classList.add('visible');
          clearTimeout(this.controlsTimeout);
          this.controlsTimeout = setTimeout(() => {
            if (this.isPlaying) {
              this.controls.classList.remove('visible');
            }
          }, 3000);
        }

        hideControls() {
          if (this.isPlaying) {
            this.controls.classList.remove('visible');
          }
        }

        seek(e) {
          const rect = this.progressBar.getBoundingClientRect();
          const pos = (e.clientX - rect.left) / rect.width;
          this.video.currentTime = pos * this.video.duration;
        }

        updateProgress() {
          if (this.video.duration) {
            const progress = (this.video.currentTime / this.video.duration) * 100;
            this.progressFill.style.width = progress + '%';
            this.updateTimeDisplay();
          }
        }

        updateTimeDisplay() {
          const current = this.formatTime(this.video.currentTime);
          const duration = this.formatTime(this.video.duration);
          this.timeDisplay.textContent = `${current} / ${duration}`;
        }

        formatTime(seconds) {
          if (isNaN(seconds)) return '00:00';
          const mins = Math.floor(seconds / 60);
          const secs = Math.floor(seconds % 60);
          return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        toggleMute() {
          this.isMuted = !this.isMuted;
          this.video.muted = this.isMuted;
          this.updateVolumeDisplay();
        }

        setVolume(e) {
          const rect = this.volumeSlider.getBoundingClientRect();
          const pos = (e.clientX - rect.left) / rect.width;
          this.volume = Math.max(0, Math.min(1, pos));
          this.video.volume = this.volume;
          this.isMuted = this.volume === 0;
          this.video.muted = this.isMuted;
          this.updateVolumeDisplay();
        }

        updateVolumeDisplay() {
          this.volumeFill.style.width = this.volume * 100 + '%';

          if (this.isMuted || this.volume === 0) {
            this.volumeIcon.textContent = '🔇';
          } else if (this.volume < 0.5) {
            this.volumeIcon.textContent = '🔉';
          } else {
            this.volumeIcon.textContent = '🔊';
          }
        }

        toggleFullscreen() {
          if (!document.fullscreenElement) {
            this.videoPlayer.requestFullscreen();
          } else {
            document.exitFullscreen();
          }
        }

        handleKeyboard(e) {
          if (e.target.tagName === 'INPUT') return;

          switch (e.code) {
            case 'Space':
              e.preventDefault();
              this.togglePlay();
              break;
            case 'ArrowLeft':
              e.preventDefault();
              this.video.currentTime -= 10;
              break;
            case 'ArrowRight':
              e.preventDefault();
              this.video.currentTime += 10;
              break;
            case 'ArrowUp':
              e.preventDefault();
              this.volume = Math.min(1, this.volume + 0.1);
              this.video.volume = this.volume;
              this.updateVolumeDisplay();
              break;
            case 'ArrowDown':
              e.preventDefault();
              this.volume = Math.max(0, this.volume - 0.1);
              this.video.volume = this.volume;
              this.updateVolumeDisplay();
              break;
            case 'KeyM':
              e.preventDefault();
              this.toggleMute();
              break;
            case 'KeyF':
              e.preventDefault();
              this.toggleFullscreen();
              break;
          }
        }
      }

      // Initialize player when DOM is loaded
      document.addEventListener('DOMContentLoaded', () => {
        // Player will be initialized after loading video
      });

      // URL parameter functions (keeping your original functionality)
      function getUrlParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
      }

      function formatDate(dateString) {
        const months = [
          'січня',
          'лютого',
          'березня',
          'квітня',
          'травня',
          'червня',
          'липня',
          'серпня',
          'вересня',
          'жовтня',
          'листопада',
          'грудня',
        ];

        const date = new Date(dateString);
        const day = date.getDate();
        const month = months[date.getMonth()];
        const year = date.getFullYear();

        return `${day} ${month} ${year}`;
      }

      function extractVideoInfo(videoPath) {
        const pathParts = videoPath.split('/');
        const datePart = pathParts[1] || '';

        const dateMatch = datePart.match(/(\d{2})-(\d{2})-(\d{4})-(\d{2})-(\d{2})/);
        let formattedDate = 'Дата не вказана';

        if (dateMatch) {
          const [, day, month, year, hour, minute] = dateMatch;
          const dateString = `${year}-${month}-${day}`;
          formattedDate = formatDate(dateString);
          formattedDate = `Запис від ${formattedDate} о ${hour}:${minute}`;
        }

        return { formattedDate };
      }

      function buildVideoUrl(filePath) {
        const baseUrl = 'https://f005.backblazeb2.com/file/twitchrecords/';
        return baseUrl + filePath;
      }

      // Load video from URL parameters
      const videoPath = getUrlParameter('video');
      const videoTitle = getUrlParameter('title');

      // Initialize player
      const player = new TelegramVideoPlayer();

      if (videoPath) {
        const fullVideoUrl = buildVideoUrl(videoPath);
        const videoInfo = extractVideoInfo(videoPath);

        // Load video with HLS support
        player.loadVideo(fullVideoUrl);

        document.querySelector('.video-title').textContent = videoTitle || 'Назва відео';
        document.querySelector('.video-date').textContent = videoInfo.formattedDate;
      }
    </script>
  </body>
</html>
