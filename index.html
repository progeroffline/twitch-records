<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video Player</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #17212b;
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
      }

      @media (max-width: 768px) {
        body {
          padding: 0;
          height: 100vh;
          overflow: hidden;
        }
      }

      .container {
        max-width: 800px;
        width: 100%;
        background: #242f3d;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }

      @media (max-width: 768px) {
        .container {
          height: 100vh;
          border-radius: 0;
          max-width: none;
          display: flex;
          flex-direction: column;
        }
      }

      .header {
        background: #2b5278;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 16px;
      }

      .channel-info h3 {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 2px;
      }

      .channel-info p {
        font-size: 13px;
        opacity: 0.7;
      }

      .video-wrapper {
        position: relative;
        width: 100%;
        background: #000;
      }

      @media (max-width: 768px) {
        .video-wrapper {
          flex: 1;
          display: flex;
          align-items: center;
          justify-content: center;
        }
      }

      .video-js {
        width: 100% !important;
        height: auto !important;
      }

      @media (max-width: 768px) {
        .video-js {
          width: 100% !important;
          height: 100% !important;
        }
      }

      .video-js .vjs-big-play-button {
        background: rgba(43, 82, 120, 0.8);
        border: none;
        border-radius: 50%;
        width: 80px;
        height: 80px;
        line-height: 80px;
        font-size: 28px;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        transition: all 0.3s ease;
      }

      .video-js .vjs-big-play-button:hover {
        background: rgba(43, 82, 120, 1);
        transform: translate(-50%, -50%) scale(1.1);
      }

      .video-js .vjs-control-bar {
        background: rgba(0, 0, 0, 0.7);
        height: 40px;
      }

      .video-js .vjs-play-control,
      .video-js .vjs-volume-control,
      .video-js .vjs-fullscreen-control {
        color: #ffffff;
      }

      .video-js .vjs-progress-control .vjs-progress-holder {
        height: 4px;
        background: rgba(255, 255, 255, 0.3);
      }

      .video-js .vjs-progress-control .vjs-play-progress {
        background: #2b5278;
      }

      .support-banner {
        background: linear-gradient(135deg, #2b5278 0%, #4a6741 100%);
        padding: 16px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
      }

      .support-info {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .support-icon {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }

      .support-text h4 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 2px;
      }

      .support-text p {
        font-size: 12px;
        opacity: 0.8;
      }

      .support-button {
        background: #ffffff;
        color: #2b5278;
        border: none;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
      }

      .support-button:hover {
        background: #f0f0f0;
        transform: translateY(-1px);
      }

      @media (max-width: 768px) {
        body {
          padding: 10px;
        }

        .container {
          border-radius: 8px;
        }

        .header {
          padding: 12px 16px;
        }

        .avatar {
          width: 36px;
          height: 36px;
          font-size: 14px;
        }

        .channel-info h3 {
          font-size: 14px;
        }

        .channel-info p {
          font-size: 12px;
        }

        .video-js .vjs-big-play-button {
          width: 60px;
          height: 60px;
          line-height: 60px;
          font-size: 24px;
        }

        .support-banner {
          padding: 12px 16px;
          flex-direction: column;
          text-align: center;
        }

        .support-info {
          flex-direction: column;
          text-align: center;
        }

        .support-button {
          width: 100%;
          max-width: 200px;
        }
      }

      @media (max-width: 480px) {
        .header {
          padding: 10px 12px;
        }

        .support-banner {
          padding: 10px 12px;
        }

        .video-js .vjs-control-bar {
          height: 36px;
        }

        .video-js .vjs-big-play-button {
          width: 50px;
          height: 50px;
          line-height: 50px;
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="avatar">V</div>
        <div class="channel-info">
          <h3>Video Channel</h3>
          <p>Live Stream</p>
        </div>
      </div>

      <div class="video-wrapper">
        <video
          id="my-video"
          class="video-js"
          controls
          preload="auto"
          playsinline
          data-setup="{}"
        >
          <source
            src="https://f005.backblazeb2.com/file/twitchrecords/leb1ga/12-07-2025-14-00/480/master.m3u8"
            type="application/x-mpegURL"
          />
          Your browser does not support the video tag.
        </video>
      </div>

      <div class="support-banner">
        <div class="support-info">
          <div class="support-icon">💝</div>
          <div class="support-text">
            <h4>Поддержать автора</h4>
            <p>Помогите развитию канала</p>
          </div>
        </div>
        <a href="#" class="support-button">Поддержать</a>
      </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
      function getUrlParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
      }

      function buildVideoUrl(filePath) {
        const baseUrl = 'https://f005.backblazeb2.com/file/twitchrecords/';
        return baseUrl + filePath;
      }

      const videoPath = getUrlParameter('video');

      const player = videojs('my-video', {
        responsive: true,
        fluid: true,
        aspectRatio: '16:9',
      });

      if (videoPath) {
        const fullVideoUrl = buildVideoUrl(videoPath);
        player.src({
          src: fullVideoUrl,
          type: 'application/x-mpegURL',
        });

        const channelName = videoPath.split('/')[0] || 'Video Channel';
        document.querySelector('.channel-info h3').textContent = channelName;
        document.querySelector('.avatar').textContent = channelName
          .charAt(0)
          .toUpperCase();
      }

      function resizeVideo() {
        const container = document.querySelector('.video-wrapper');
        const video = document.querySelector('#my-video');

        if (window.innerWidth > 768) {
          container.style.height = window.innerWidth * 0.5625 + 'px';
        }
      }

      window.addEventListener('resize', resizeVideo);
      resizeVideo();
    </script>
  </body>
</html>
