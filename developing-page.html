<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" href="./icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <!-- Исправлено: правильный CDN для Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <meta name="theme-color" content="#ffffff" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Twitch Records</title>
  </head>
  <body>
    <div style="height: 400px">
      <video id="player" controls></video>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const video = document.getElementById('player');
        const streamLink =
          'https://cdn.twitchrecords.space/file/twitchrecords/leb1ga/13-07-2025-20-53/1080/master.m3u8';

        // Базовые настройки Plyr
        const defaultOptions = {
          controls: [
            'play-large',
            'restart',
            'rewind',
            'play',
            'fast-forward',
            'progress',
            'current-time',
            'duration',
            'mute',
            'volume',
            'captions',
            'settings',
            'pip',
            'airplay',
            'download',
            'fullscreen',
          ],
          // Добавляем настройки качества
          quality: {
            default: 1080,
            options: [1080, 720, 480, 360], // Примерные качества
            forced: true,
            onChange: quality => updateQuality(quality),
          },
          // Настройки для HLS
          storage: { enabled: true, key: 'plyr' },
          captions: { active: false, update: false, language: 'auto' },
        };

        if (Hls.isSupported()) {
          const hls = new Hls({
            enableWorker: false,
            lowLatencyMode: true,
          });

          hls.loadSource(streamLink);
          hls.attachMedia(video);

          // Исправлено: правильное название события
          hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
            console.log('Manifest parsed:', data);

            // Получаем доступные качества
            const availableQualities = hls.levels.map(level => level.height);
            console.log('Available qualities:', availableQualities);

            // Обновляем настройки качества
            if (availableQualities.length > 0) {
              defaultOptions.quality = {
                default: availableQualities[0],
                options: availableQualities,
                forced: true,
                onChange: quality => updateQuality(quality),
              };
            }

            // Инициализируем Plyr после загрузки манифеста
            const player = new Plyr(video, defaultOptions);

            // Сохраняем ссылки в глобальную область для отладки
            window.hls = hls;
            window.player = player;

            // Обработка событий Plyr
            player.on('ready', () => {
              console.log('Plyr is ready');
            });

            player.on('error', error => {
              console.error('Plyr error:', error);
            });
          });

          // Обработка ошибок HLS
          hls.on(Hls.Events.ERROR, (event, data) => {
            console.error('HLS error:', data);
            if (data.fatal) {
              switch (data.type) {
                case Hls.ErrorTypes.NETWORK_ERROR:
                  console.log('Network error - trying to recover');
                  hls.startLoad();
                  break;
                case Hls.ErrorTypes.MEDIA_ERROR:
                  console.log('Media error - trying to recover');
                  hls.recoverMediaError();
                  break;
                default:
                  console.log('Fatal error - cannot recover');
                  hls.destroy();
                  break;
              }
            }
          });

          // Функция для обновления качества
          function updateQuality(newQuality) {
            console.log('Changing quality to:', newQuality);
            if (window.hls && window.hls.levels) {
              window.hls.levels.forEach((level, levelIndex) => {
                if (level.height === parseInt(newQuality)) {
                  window.hls.currentLevel = levelIndex;
                  console.log('Quality changed to level:', levelIndex);
                }
              });
            }
          }

          // Делаем функцию доступной глобально
          window.updateQuality = updateQuality;
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          // Для Safari (встроенная поддержка HLS)
          video.src = streamLink;
          const player = new Plyr(video, defaultOptions);
          window.player = player;
        } else {
          console.error('HLS is not supported in this browser');
        }
      });
    </script>
  </body>
</html>
